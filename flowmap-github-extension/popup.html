<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flowmap Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 15px;
      background: #0d1117;
      color: #c9d1d9;
    }
    h3 {
      margin-top: 0;
      color: #58a6ff;
      font-size: 16px;
    }
    label {
      font-size: 13px;
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: #010409;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #238636;
      color: #ffffff;
      border: 1px solid rgba(240, 246, 252, 0.1);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #2ea043;
    }
    #status {
      font-size: 12px;
      color: #3fb950;
      margin-top: 10px;
      text-align: center;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <h3>Flowmap Extension</h3>
  <label for="flowmapUrl">Deployed Flowmap URL:</label>
  <input type="url" id="flowmapUrl" placeholder="https://your-app.vercel.app" />
  <button id="saveBtn">Save URL</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
